services:

  # ── Databases ────────────────────────────────────────────────────────────────

  auth-service-db:
    container_name: auth-service-db
    image: postgres:latest
    environment:
      POSTGRES_DB: auth-service-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
    ports:
      - "5004:5432"
    volumes:
      - ./docker/db_volumes/auth-service-db:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d auth-service-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-service-db:
    container_name: order-service-db
    image: postgres:latest
    environment:
      POSTGRES_DB: order-service-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
    ports:
      - "5001:5432"
    volumes:
      - ./docker/db_volumes/order-service-db:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d order-service-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-service-db:
    container_name: payment-service-db
    image: postgres:latest
    environment:
      POSTGRES_DB: payment-service-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpass
    ports:
      - "5002:5432"
    volumes:
      - ./docker/db_volumes/payment-service-db:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d payment-service-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka (KRaft mode) ───────────────────────────────────────────────────────

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - internal

  # ── Services ─────────────────────────────────────────────────────────────────

  auth-service:
    container_name: auth-service
    image: auth-service:latest
    pull_policy: never
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: 8hf9KAJEeATIvtf5E2wzeZsoM9zaMr3O1aQTbCPngV6
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-db:5432/auth-service-db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: adminpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
    ports:
      - "4004:4004"
    depends_on:
      auth-service-db:
        condition: service_healthy
    networks:
      - internal

  order-service:
    container_name: order-service
    image: order-service:latest
    pull_policy: never
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-service-db:5432/order-service-db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: adminpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INVENTORY_SERVICE_ADDRESS: inventory-service
      INVENTORY_SERVICE_GRPC_PORT: 9001
    ports:
      - "4001:4001"
    depends_on:
      order-service-db:
        condition: service_healthy
      kafka:
        condition: service_started
      inventory-service:
        condition: service_started
    networks:
      - internal

  payment-service:
    container_name: payment-service
    image: payment-service:latest
    pull_policy: never
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-service-db:5432/payment-service-db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: adminpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "4002:4002"
    depends_on:
      payment-service-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - internal

  inventory-service:
    container_name: inventory-service
    image: inventory-service:latest
    pull_policy: never
    build:
      context: ./backend/inventory-service
      dockerfile: Dockerfile
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "4003:4003"
      - "9001:9001"    # gRPC — called by order-service to reserve stock
    depends_on:
      - kafka
    networks:
      - internal

  gateway:
    container_name: gateway
    image: gateway:latest
    pull_policy: never
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth-service:4004
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - order-service
      - payment-service
      - inventory-service
    networks:
      - internal

