spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service-route
              uri: http://order-service:4001
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: payment-service-route
              uri: http://payment-service:4002
              predicates:
                - Path=/api/payments/**
              filters:
                - StripPrefix=1

            - id: inventory-service-route
              uri: http://inventory-service:4003
              predicates:
                - Path=/api/inventory/**
              filters:
                - StripPrefix=1

            - id: auth-service-route
              uri: http://auth-service:4004
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=2

server:
  port: 4000
