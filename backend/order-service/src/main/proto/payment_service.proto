syntax = "proto3";

option java_multiple_files = true;
option java_package = "payment";

package payment;

enum PaymentStatus {
  PENDING = 0;
  APPROVED = 1;
  REJECTED = 2;
}

message PaymentResponse {
  string payment_id = 1;
  string order_id = 2;
  PaymentStatus status = 3;
  string message = 4;
  string correlation_id = 5;
}
